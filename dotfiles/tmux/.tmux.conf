# Set Ctrl-g as the prefix key
unbind C-b                # unbind the default Ctrl-b
set-option -g prefix C-g  # set prefix to Ctrl-g
bind C-g send-prefix      # make sure prefix still works

# Make escape-time shorter for snappier interactions
set -sg escape-time 0

setw -g mode-keys vi      # use vi-style key bindings in copy mode
set -g mouse on           # enable mouse support

# Navigate panes with Vim keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @tokyo-night-tmux_theme night
set -g @tokyo-night-tmux_transparent 1
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_show_datetime 0
set -g @tokyo-night-tmux_show_git 0
set -g @tokyo-night-tmux_show_wbg 0
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
run '~/.tmux/plugins/tpm/tpm'

# Propagate AWS_PROFILE into tmux server env on attach/new-window
set -g update-environment "AWS_PROFILE"

# Custom status segments (appended after Tokyo Night)
set -ga status-right "#[fg=#a9b1d6,bg=default] 󰉋 #(echo #{pane_current_path} | sed \"s|$HOME|~|;s:\\(\\.*[^/]\\{1,3\\}\\)[^/]*/:\\1/:g\") "
set -ga status-right "#[fg=#7aa2f7,bg=default] 󰅟 #(if command -v aws >/dev/null 2>&1; then printenv AWS_PROFILE || echo 'default'; else echo '-'; fi) "
set -ga status-right "#[fg=#9ece6a,bg=default] ⎈ #(if command -v kubectl >/dev/null 2>&1; then kubectl config current-context 2>/dev/null | sed 's|.*/||' | grep . || echo 'N/A'; else echo '-'; fi) "

# Enable focus events for vim autoread
set-option -g focus-events on
