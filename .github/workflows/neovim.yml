name: neovim
on:
  push:
    branches: [main]
    paths:
      - 'dotfiles/nvim/**'
      - '.github/workflows/neovim.yml'
  pull_request:
    branches: [main]
    paths:
      - 'dotfiles/nvim/**'
      - '.github/workflows/neovim.yml'
  workflow_dispatch:
jobs:
  format:
    name: format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Check formatting
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check dotfiles/nvim
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install selene
        run: |
          gh release download --repo Kampfkarren/selene -p 'selene-light-*-linux.zip' -O /tmp/selene.zip
          unzip /tmp/selene.zip -d /usr/local/bin/
          chmod +x /usr/local/bin/selene
        env:
          GH_TOKEN: ${{ github.token }}
      - name: Lint
        run: |
          cd dotfiles/nvim
          selene .
  test:
    name: neovim (${{ matrix.nvim-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        nvim-version:
          - stable
          - nightly
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Neovim
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.nvim-version }}
      - name: Show Neovim version
        run: nvim --version
      - name: Test config loads without errors
        run: |
          cd dotfiles/nvim
          nvim --headless -u tests/minimal_init.lua +qa
