version: '3'
tasks:
  test:
    desc: Build the configuration without activating it
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os test --hostname default .
  switch:
    desc: Build and activate the configuration
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os switch --hostname default .
  update:
    desc: Update flake lockfile and apply changes
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os switch -u --hostname default .
  lint:
    desc: Run formatting and linting checks
    dir: /home/jesal/nixos-config
    cmds:
      - alejandra --check .
      - statix check --ignore 'hosts/default/hardware-configuration.nix' .
      - deadnix --fail --exclude hosts/default/hardware-configuration.nix .
      - stylua --check dotfiles/nvim
      - cd dotfiles/nvim && selene .
      - actionlint
      - nix flake check --no-build
  clean:
    desc: Clean old generations and run garbage collection
    dir: /home/jesal/nixos-config
    cmds:
      - nh clean all --keep-since 7d --keep 10
  zsh:update:
    desc: Update zsh plugins (git pull each) and reset the compinit dump
    cmds:
      - |
        dir="${XDG_DATA_HOME:-$HOME/.local/share}/zsh/plugins"
        if [ ! -d "$dir" ]; then
          echo "no zsh plugins installed yet at $dir"
          exit 0
        fi
        for p in "$dir"/*/; do
          [ -d "$p/.git" ] || continue
          echo "updating $(basename "$p")"
          git -C "$p" pull --ff-only
        done
      # Plugin updates can change fpath completions; drop the dump so the
      # next shell rebuilds it instead of trusting it with -C for up to a day.
      - rm -f "${XDG_CACHE_HOME:-$HOME/.cache}/zsh/zcompdump"
  macos:bootstrap:
    desc: Bootstrap a bare-nix mac (symlink dotfiles, install CLI tools, set up direnv)
    platforms: [darwin]
    vars:
      DOTFILES: '{{.ROOT_DIR}}/dotfiles'
    cmds:
      # Symlink shared dotfiles into place.
      - |
        link() {
          src="$1"; dst="$2"
          if [ -e "$dst" ] && [ ! -L "$dst" ]; then
            echo "backing up existing $dst -> $dst.pre-link.bak"
            mv "$dst" "$dst.pre-link.bak"
          fi
          mkdir -p "$(dirname "$dst")"
          ln -sfn "$src" "$dst"
          echo "linked $dst -> $src"
        }
        link "{{.DOTFILES}}/zsh/.zshrc"      "$HOME/.zshrc"
        link "{{.DOTFILES}}/nvim"            "$HOME/.config/nvim"
        link "{{.DOTFILES}}/tmux/.tmux.conf" "$HOME/.tmux.conf"
      # Install CLI tools via Homebrew, skipping any already on PATH.
      - |
        command -v brew >/dev/null 2>&1 || {
          echo "Homebrew not found; install it first: https://brew.sh" >&2
          exit 1
        }
        # "formula:command" pairs; command defaults to formula when omitted.
        tools="atuin bat direnv eza fd fzf gh go jujutsu:jj neovim:nvim \
          ripgrep:rg starship tmux yazi zoxide"
        missing=""
        for entry in $tools; do
          formula="${entry%%:*}"
          cmd="${entry#*:}"
          command -v "$cmd" >/dev/null 2>&1 || missing="$missing $formula"
        done
        if [ -n "$missing" ]; then
          echo "installing:$missing"
          brew install $missing
        else
          echo "all CLI tools already on PATH; nothing to install"
        fi
      # nix-direnv
      - |
        rc="$HOME/.nix-profile/share/nix-direnv/direnvrc"
        [ -e "$rc" ] || nix profile install nixpkgs#nix-direnv
        mkdir -p "$HOME/.config/direnv"
        grep -q nix-direnv "$HOME/.config/direnv/direnvrc" 2>/dev/null || \
          echo 'source $HOME/.nix-profile/share/nix-direnv/direnvrc' \
            >> "$HOME/.config/direnv/direnvrc"
