version: '3'
tasks:
  test:
    desc: Build the configuration without activating it
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os test --hostname default .
  switch:
    desc: Build and activate the configuration
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os switch --hostname default .
  update:
    desc: Update flake lockfile and apply changes
    dir: /home/jesal/nixos-config
    cmds:
      - git add --intent-to-add .
      - nh os switch -u --hostname default .
  lint:
    desc: Run formatting and linting checks
    dir: /home/jesal/nixos-config
    cmds:
      - alejandra --check .
      - statix check --ignore 'hosts/default/hardware-configuration.nix' .
      - deadnix --fail --exclude hosts/default/hardware-configuration.nix .
      - stylua --check dotfiles/nvim
      - cd dotfiles/nvim && selene .
      - actionlint
      - nix flake check --no-build
  clean:
    desc: Clean old generations and run garbage collection
    dir: /home/jesal/nixos-config
    cmds:
      - nh clean all --keep-since 7d --keep 10
  zsh:update:
    desc: Update zsh plugins (git pull each)
    cmds:
      - |
        dir="${XDG_DATA_HOME:-$HOME/.local/share}/zsh/plugins"
        if [ ! -d "$dir" ]; then
          echo "no zsh plugins installed yet at $dir"
          exit 0
        fi
        for p in "$dir"/*/; do
          [ -d "$p/.git" ] || continue
          echo "updating $(basename "$p")"
          git -C "$p" pull --ff-only
        done
